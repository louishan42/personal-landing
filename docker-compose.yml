services:
  db:
    image: postgres:16
    container_name: lifeape-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifeape
    ports:
      - "5432:5432"
    volumes:
      - lifeape_pgdata:/var/lib/postgresql/data

volumes:
  lifeape_pgdata:
